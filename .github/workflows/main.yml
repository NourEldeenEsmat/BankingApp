name: Build and push to Docker Hub

on:
  push:
    branches: [ 'master' ]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build (Maven) and Push Docker image
    runs-on: ubuntu-latest
    env:
      REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Validate required secrets
        run: |
          if [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]]; then
            echo "❌ Error: DOCKERHUB_USERNAME secret is not set"
            exit 1
          fi
          if [[ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "❌ Error: DOCKERHUB_TOKEN secret is not set"
            exit 1
          fi
          if [[ -z "${{ secrets.DOCKERHUB_REPOSITORY }}" ]]; then
            echo "❌ Error: DOCKERHUB_REPOSITORY secret is not set"
            echo "Set it to: yourusername/your-repo-name"
            exit 1
          fi
          echo "✓ All required secrets are set"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven (skip tests)
        run: mvn -B package --file pom.xml -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_REPOSITORY }}:latest
            ${{ secrets.DOCKERHUB_REPOSITORY }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_REPOSITORY }}:buildcache,mode=max

      - name: Image info
        run: |
          echo "Pushed: $REPOSITORY:latest"

# Required repository secrets:
# - DOCKERHUB_USERNAME: Your Docker Hub username
# - DOCKERHUB_TOKEN: A Docker Hub access token or password
# - DOCKERHUB_REPOSITORY: e.g. "yourusername/your-repo" (used as image name)
